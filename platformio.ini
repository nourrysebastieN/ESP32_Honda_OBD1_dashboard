; PlatformIO Project Configuration File
; Makerfabs 7" ESP32-S3 (typically N16R8: 16MB flash + 8MB PSRAM)
; Project uses LVGL from `lib/lvgl` and LovyanGFX (with built-in GT911 touch).

[platformio]
default_envs = esp32-s3-n16r8

[env:esp32-s3-n16r8]
platform = espressif32
; Use a known PlatformIO board ID; keep 16MB/PSRAM settings via overrides below.
board = esp32-s3-devkitc-1
framework = arduino

; Flash / PSRAM
board_build.arduino.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

; Serial / USB
monitor_speed = 115200
upload_speed = 921600

build_flags =
  ; Important for native USB CDC on ESP32-S3
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

  ; PSRAM
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

  ; LVGL config location
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_LVGL_H_INCLUDE_SIMPLE

  ; Display / board variant
  ; Makerfabs MaTouch ESP32-S3 7" RGB panel (1024x600)
  -DDISPLAY_MAKERFABS_MATOUCH_1024X600=1

  ; C++ exceptions (used by some libs)
  -fexceptions

  ; Local headers
  -I$PROJECT_DIR/include

; Matches the codebase: display/touch handled via LovyanGFX (Touch_GT911)
lib_deps =
  lovyan03/LovyanGFX@^1.2.0

monitor_filters =
  esp32_exception_decoder
  time

; Keep the simulator entrypoint out of MCU builds.
build_src_filter =
  +<*>
  -<sim_main.cpp>

[env:native-sim]
platform = native

build_flags =
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_LVGL_H_INCLUDE_SIMPLE
  -DDISPLAY_WIDTH=800
  -DDISPLAY_HEIGHT=480
  -DLV_USE_SDL=1
  -DDEBUG_ENABLED=0
  -I$PROJECT_DIR/include
  !pkg-config --cflags sdl2
  !pkg-config --libs sdl2

; Native sim uses `src/sim_main.cpp` and avoids Arduino-only files.
build_src_filter =
  +<*>
  -<main.cpp>
  -<display_driver.cpp>
  -<obd1_handler.cpp>
