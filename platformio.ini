; PlatformIO Project Configuration File
; ESP32-S3 Honda OBD1 Dashboard with 7" LVGL Display
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Board configuration for ESP32-S3 with PSRAM
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; Memory settings - enable PSRAM for large display buffer
board_build.arduino.memory_type = qio_opi

; Upload and monitor settings
upload_speed = 921600
monitor_speed = 115200

; Build flags
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL configuration
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    ; Display configuration (adjust for your specific 7" display)
    -DDISPLAY_WIDTH=800
    -DDISPLAY_HEIGHT=480
    ; Enable C++ exceptions
    -fexceptions

; Library dependencies
lib_deps = 
    lvgl/lvgl@^9.2.2
    lovyan03/LovyanGFX@^1.2.0

; Extra source filter
build_src_filter = 
    +<*>
    +<../lib/>
